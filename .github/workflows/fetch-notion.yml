name: Fetch Notion Cycle Data

on:
  workflow_dispatch:

concurrency:
  group: fetch-notion-cycle-data
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch from Notion and save JSON
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: a1b7818c3d134a29b5bd7e52701bdfcc
        run: |
          python3 - <<'EOF'
          import urllib.request
          import json
          import os
          import datetime

          token       = os.environ["NOTION_TOKEN"]
          database_id = os.environ["DATABASE_ID"]
          url         = f"https://api.notion.com/v1/databases/{database_id}/query"
          headers     = {
              "Authorization": f"Bearer {token}",
              "Notion-Version": "2022-06-28",
              "Content-Type": "application/json",
          }

          all_results = []
          body        = {"page_size": 100}

          while True:
              req  = urllib.request.Request(url, data=json.dumps(body).encode(), headers=headers, method="POST")
              resp = urllib.request.urlopen(req)
              data = json.loads(resp.read())
              all_results.extend(data.get("results", []))
              if not data.get("has_more"):
                  break
              body["start_cursor"] = data["next_cursor"]

          entries = []
          for page in all_results:
              props = page.get("properties", {})

              def get_number(name):
                  p = props.get(name, {})
                  return p.get("number") if p.get("type") == "number" else None

              def get_text(name):
                  p = props.get(name, {})
                  if p.get("type") == "rich_text":
                      parts = p.get("rich_text", [])
                      return parts[0]["plain_text"].strip() if parts else None
                  if p.get("type") == "title":
                      parts = p.get("title", [])
                      return parts[0]["plain_text"].strip() if parts else None
                  return None

              def get_checkbox(name):
                  p = props.get(name, {})
                  return p.get("checkbox", False) if p.get("type") == "checkbox" else False

              cycle_no  = get_text("Cycle No.")
              cycle_day = get_number("Cycle Day")
              temp      = get_number("Temperature (°C)")
              ehm       = get_checkbox("ehM")

              if cycle_no and cycle_day is not None:
                  entries.append({
                      "cycle_no":  cycle_no,
                      "cycle_day": int(cycle_day),
                      "temp":      temp,
                      "ehm":       ehm,
                  })

          cycles   = {}
          ehm_days = {}

          for e in entries:
              cn  = e["cycle_no"]
              day = str(e["cycle_day"])
              if cn not in cycles:
                  cycles[cn]   = {}
                  ehm_days[cn] = []
              if e["temp"] is not None:
                  cycles[cn][day] = e["temp"]
              if e["ehm"]:
                  ehm_days[cn].append(e["cycle_day"])

          all_cycles       = sorted(ehm_days.keys(), key=lambda x: float(x))
          temp_cycles      = [cn for cn in all_cycles if cycles.get(cn)]
          top3             = list(reversed(temp_cycles))[:3]

          result = {
              "updated":    datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "top_cycles": top3,
              "all_cycles": all_cycles,
              "data":       {cn: cycles[cn]   for cn in top3},
              "ehm":        {cn: ehm_days[cn] for cn in top3},
              "all_ehm":    {cn: sorted(ehm_days[cn]) for cn in all_cycles},
          }

          os.makedirs("docs", exist_ok=True)
          with open("docs/cycle-data.json", "w") as f:
              json.dump(result, f, indent=2)

          print(f"Saved {len(entries)} entries, temp cycles: {top3}, all cycles: {all_cycles}")
          EOF

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/cycle-data.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: refresh cycle data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
