<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycle Temperature Comparison</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f5;
    --surface: #ffffff;
    --border: #e8e2da;
    --text-primary: #1a1510;
    --text-secondary: #7a6f63;
    --text-muted: #b0a89e;
    --accent-1: #8b6f9e;
    --accent-2: #4a9e7f;
    --accent-3: #c4734a;
    --accent-1-soft: rgba(139,111,158,0.12);
    --accent-2-soft: rgba(74,158,127,0.12);
    --accent-3-soft: rgba(196,115,74,0.12);
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .header h1 em { font-style: italic; color: var(--accent-1); }
  .subtitle {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 0.4rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.7rem;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }
  .chart-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 1.5rem 1rem;
  }
  .chart-wrap { position: relative; height: 370px; }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-top: 1rem;
  }
  .stat-card {
    border-radius: 10px;
    padding: 0.875rem 1rem;
    border: 1px solid transparent;
  }
  .stat-card.c1 { background: var(--accent-1-soft); border-color: rgba(139,111,158,0.2); }
  .stat-card.c2 { background: var(--accent-2-soft); border-color: rgba(74,158,127,0.2); }
  .stat-card.c3 { background: var(--accent-3-soft); border-color: rgba(196,115,74,0.2); }
  .stat-label {
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .stat-cycle {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    font-weight: 400;
    margin-bottom: 4px;
  }
  .c1 .stat-cycle { color: var(--accent-1); }
  .c2 .stat-cycle { color: var(--accent-2); }
  .c3 .stat-cycle { color: var(--accent-3); }
  .stat-temps { font-size: 0.68rem; color: var(--text-secondary); line-height: 1.6; }
  .loading {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
    font-size: 0.8rem;
    letter-spacing: 0.06em;
  }
  .loading-dots::after {
    content: '';
    animation: dots 1.5s infinite;
  }
  @keyframes dots {
    0%   { content: '.'; }
    33%  { content: '..'; }
    66%  { content: '...'; }
    100% { content: ''; }
  }
  .error {
    background: #fff5f5;
    border: 1px solid #fca5a5;
    border-radius: 10px;
    padding: 1.25rem;
    font-size: 0.78rem;
    color: #c4574a;
    line-height: 1.7;
  }
  .error strong { display: block; margin-bottom: 0.4rem; }
  .updated {
    font-size: 0.62rem;
    color: var(--text-muted);
    text-align: right;
    margin-top: 0.75rem;
    letter-spacing: 0.04em;
  }
  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr; }
    .legend { gap: 0.75rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>basal body <em>temperature</em></h1>
  <p class="subtitle">cycle comparison — top 3 cycles</p>
</div>

<div id="legend" class="legend"></div>

<div class="chart-container">
  <div id="loading" class="loading"><span class="loading-dots">loading</span></div>
  <div id="error" style="display:none" class="error"></div>
  <div id="chart-area" style="display:none">
    <div class="chart-wrap">
      <canvas id="chart" role="img" aria-label="Basal body temperature comparison across the three most recent cycles by cycle day"></canvas>
    </div>
  </div>
</div>

<div id="stats-grid" class="stats-grid" style="display:none"></div>
<p class="updated" id="updated-time"></p>

<script>
const COLORS = [
  { line: '#8b6f9e', dot: '#8b6f9e', soft: 'rgba(139,111,158,0.08)', dash: [],    cls: 'c1' },
  { line: '#4a9e7f', dot: '#4a9e7f', soft: 'rgba(74,158,127,0.06)',  dash: [6,3], cls: 'c2' },
  { line: '#c4734a', dot: '#c4734a', soft: 'rgba(196,115,74,0.06)',  dash: [2,3], cls: 'c3' },
];

function buildLegend(cycleNums) {
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  cycleNums.forEach((cn, i) => {
    const col  = COLORS[i];
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <svg width="32" height="12" viewBox="0 0 32 12">
        <line x1="0" y1="6" x2="32" y2="6" stroke="${col.line}"
              stroke-width="${i===0?2.5:2}"
              stroke-dasharray="${col.dash.join(' ')}"/>
        <circle cx="16" cy="6" r="3.5" fill="${col.dot}" stroke="white" stroke-width="1.5"/>
      </svg>
      <span>cycle ${cn}${i===0?' (latest)':''}</span>`;
    leg.appendChild(item);
  });
}

function buildChart(data, cycleNums) {
  const maxDay = Math.max(...cycleNums.flatMap(cn => Object.keys(data[cn]).map(Number)));
  const labels  = Array.from({ length: maxDay }, (_, i) => i + 1);

  const allTemps = cycleNums.flatMap(cn => Object.values(data[cn]));
  const minT = Math.min(...allTemps);
  const maxT = Math.max(...allTemps);

  const datasets = cycleNums.map((cn, i) => {
    const col = COLORS[i];
    return {
      label: `Cycle ${cn}`,
      data: labels.map(d => data[cn][String(d)] ?? null),
      borderColor: col.line,
      backgroundColor: col.soft,
      borderWidth: i === 0 ? 2.5 : 2,
      pointRadius: 3.5,
      pointHoverRadius: 6,
      pointBackgroundColor: col.dot,
      pointBorderColor: 'white',
      pointBorderWidth: 1.5,
      tension: 0.35,
      fill: false,
      borderDash: col.dash,
      spanGaps: true,
    };
  });

  new Chart(document.getElementById('chart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1510',
          titleColor: '#faf8f5',
          bodyColor: '#c8bcb0',
          padding: 12,
          titleFont: { family: "'DM Mono', monospace", size: 11 },
          bodyFont: { family: "'DM Mono', monospace", size: 11 },
          callbacks: {
            title: ctx => `cycle day ${ctx[0].label}`,
            label: ctx => {
              const v = ctx.parsed.y;
              return v !== null ? `  ${ctx.dataset.label}: ${v.toFixed(2)}°C` : `  ${ctx.dataset.label}: —`;
            },
          },
        },
      },
      scales: {
        x: {
          title: { display: true, text: 'cycle day', color: '#b0a89e', font: { family: "'DM Mono', monospace", size: 11 }, padding: { top: 8 } },
          ticks: {
            color: '#b0a89e',
            font: { family: "'DM Mono', monospace", size: 10 },
            autoSkip: false,
            maxRotation: 0,
            callback: (_, i) => (i + 1) % 2 === 1 ? i + 1 : '',
          },
          grid: { color: 'rgba(0,0,0,0.05)' },
        },
        y: {
          title: { display: true, text: 'temp (°C)', color: '#b0a89e', font: { family: "'DM Mono', monospace", size: 11 } },
          min: parseFloat((minT - 0.1).toFixed(1)),
          max: parseFloat((maxT + 0.1).toFixed(1)),
          ticks: {
            color: '#b0a89e',
            font: { family: "'DM Mono', monospace", size: 10 },
            stepSize: 0.1,
            callback: v => v.toFixed(1),
          },
          grid: { color: 'rgba(0,0,0,0.05)' },
        },
      },
    },
  });
}

function buildStats(data, cycleNums) {
  const grid = document.getElementById('stats-grid');
  grid.innerHTML = '';
  grid.style.display = 'grid';
  cycleNums.forEach((cn, i) => {
    const temps = Object.values(data[cn]);
    const avg   = (temps.reduce((a, b) => a + b, 0) / temps.length).toFixed(2);
    const min   = Math.min(...temps).toFixed(2);
    const max   = Math.max(...temps).toFixed(2);
    const card  = document.createElement('div');
    card.className = `stat-card ${COLORS[i].cls}`;
    card.innerHTML = `
      <p class="stat-label">${i===0?'latest':`prev ${i}`}</p>
      <p class="stat-cycle">cycle ${cn}</p>
      <p class="stat-temps">avg ${avg}°C<br>range ${min} – ${max}°C<br>${temps.length} days recorded</p>`;
    grid.appendChild(card);
  });
}

async function main() {
  try {
    // Fetch the pre-built JSON (same origin — no CORS)
    const res = await fetch('cycle-data.json');
    if (!res.ok) throw new Error(`Could not load cycle-data.json (${res.status}). Has the GitHub Action run yet?`);
    const json = await res.json();

    const cycleNums = json.top_cycles;
    const data      = json.data;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('chart-area').style.display = 'block';

    buildLegend(cycleNums);
    buildChart(data, cycleNums);
    buildStats(data, cycleNums);

    if (json.updated) {
      const d = new Date(json.updated);
      document.getElementById('updated-time').textContent =
        `data refreshed ${d.toLocaleString('de-DE', { dateStyle: 'medium', timeStyle: 'short' })}`;
    }
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').innerHTML = `<strong>Could not load data</strong>${err.message}`;
  }
}

main();
</script>
</body>
</html>
